### model
model_name_or_path: /mnt/8tb_hdd/under115b/traffic_legal_lm/models/Llama-3-Taiwan-8B-Instruct

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

### dataset
dataset: traffic_legal_0603_train
val_size: 0
eval_dataset: traffic_legal_0603_val
dataset_dir: /workspace/data
template: llama3
cutoff_len: 1024

### output
output_dir: /workspace/models/round2_sonnet46_lora
logging_steps: 10
save_steps: 100
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
per_device_eval_batch_size: 1
learning_rate: 2.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
gradient_checkpointing: true

### early stopping（與 GPT-4o baseline 相同設定）
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
eval_strategy: steps
eval_steps: 100
